    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBF-nMMW5lG44JfHxx4HxCbf5N81geOiRs",
            authDomain: "bauet-hms-63f5b.firebaseapp.com",
            databaseURL: "https://bauet-hms-63f5b-default-rtdb.firebaseio.com",
            projectId: "bauet-hms-63f5b",
            storageBucket: "bauet-hms-63f5b.appspot.com",
            messagingSenderId: "200038506273",
            appId: "1:200038506273:web:2e141fc9ec36de049ae860"
        };
    
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); // Initialize Firebase Authentication
        const firestore = getFirestore(app); // Initialize Firestore
    
        // Logout functionality
        document.getElementById('logout').onclick = function () {
            signOut(auth)
                .then(() => {
                    // Clear session storage
                    sessionStorage.clear();
    
                    // Redirect to login page
                    window.location.href = "login.html";
                })
                .catch((error) => {
                    console.error("Error during logout:", error.message);
                    alert("Failed to log out. Please try again.");
                });
        };
    
        // Prevent browser caching
        window.onload = function () {
            if (performance.navigation.type === 2) {
                // Clear session storage and redirect to login if back button is pressed
                sessionStorage.clear();
                window.location.href = "login.html";
            }
        };
    
        // Function to load complaints from Firestore
        async function loadComplaints() {
            const container = document.getElementById("complaints-container");
            container.innerHTML = ""; // Clear the container before loading complaints
    
            try {
                // Fetch complaints from the "Complaints" collection in Firestore
                const querySnapshot = await getDocs(collection(firestore, "Complaints"));
                querySnapshot.forEach((doc) => {
                    const complaint = doc.data(); // Get complaint data
    
                    // Ensure all required fields are present
                    const subject = complaint.subject || "No Subject";
                    const description = complaint.description || "No Description";
                    const room = complaint.roomNumber || "No Room";
                    const id = complaint.userId || "No ID";
    
                    const card = document.createElement("div");
                    card.className = "col-md-4 mb-3";
                    card.innerHTML = `
                        <div class="card complaint-card" onclick="toggleComplaint('${doc.id}')">
                            <div class="card-body">
                                <h5 class="card-title">${subject}</h5>
                                <p class="card-text complaint-description" id="description-${doc.id}">
                                    ${description}
                                </p>
                                <p class="card-text"><b>Room:</b> ${room}</p>
                                <p class="card-text"><b>ID:</b> ${id}</p>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Error loading complaints:", error.message);
                alert("Failed to load complaints. Please try again.");
            }
        }
    
        // Function to toggle complaint description visibility
        window.toggleComplaint = function (id) {
            const description = document.getElementById(`description-${id}`);
            const card = description.closest(".complaint-card");
            card.classList.toggle("expanded");
        };
    
        // Load complaints on page load
        document.addEventListener("DOMContentLoaded", loadComplaints);
        document.getElementById("profile").onclick = function () {
            const studentId = new URLSearchParams(window.location.search).get("id");
            if (studentId) {
                window.location.href = `profile.html?id=${studentId}`;
            } else {
                alert("Student ID not found in URL.");
            }
        };
    </script>
