    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBF-nMMW5lG44JfHxx4HxCbf5N81geOiRs",
            authDomain: "bauet-hms-63f5b.firebaseapp.com",
            databaseURL: "https://bauet-hms-63f5b-default-rtdb.firebaseio.com",
            projectId: "bauet-hms-63f5b",
            storageBucket: "bauet-hms-63f5b.appspot.com",
            messagingSenderId: "200038506273",
            appId: "1:200038506273:web:2e141fc9ec36de049ae860"
        };
    
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);
    
        // Global variable to store user data
        let userData = null;
    
        // Retrieve studentId from URL
        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('id');
    
        if (!studentId) {
            alert("Student ID not found in the URL.");
        } else {
            fetchUserData(studentId);
        }
    
        // Fetch user data from Firebase
        function fetchUserData(studentId) {
            const dbRef = ref(database);
            get(child(dbRef, `users/${studentId}`))
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        userData = snapshot.val(); // Store user data in the global variable
                        displayUserData(userData);
                    } else {
                        alert("User not found in the database.");
                    }
                })
                .catch((error) => {
                    console.error("Database Error:", error.message);
                });
        }
    
        // Display user data on the page
        function displayUserData(userData) {
            document.getElementById("name").textContent = `Name: ${userData.name}`;
            document.getElementById("id").textContent = `ID: ${userData.id}`;
            document.getElementById("batch").textContent = `Batch: ${userData.batch}`;
            document.getElementById("roomNo").textContent = `Room No: ${userData.room}`;
            document.getElementById("contact").querySelector("b").textContent = `Mobile: ${userData.phone_number}`;
            document.getElementById("email").querySelector("b").textContent = `Email: ${userData.email}`;
            document.getElementById("address").querySelector("b").textContent = `Permanent Address: ${userData.address}`;
            document.getElementsByClassName("rounded-circle")[0].src = userData.profile_image_url || "assets/img/profile-user.png"; // Default image if not available
        }
    
        // Tab switching functions
        window.showContactInfo = function () {
            document.getElementById("info-content").innerHTML = `
                <div class="info-container">
                    <h4 class="card-title"><span style="text-decoration: underline;">Contact Information</span></h4>
                    <div class="info-item"><b>Mobile:</b> ${userData.phone_number}</div>
                    <div class="info-item"><b>Email:</b> ${userData.email}</div>
                    <div class="info-item"><b>Permanent Address:</b> ${userData.address}</div>
                    <div class="btn-container">
                        <button class="btn btn-danger" type="button" style="height: 19%;">Change Password</button>
                    </div>
                </div>
            `;
            document.getElementById("contact-tab").classList.add("active");
            document.getElementById("personal-tab").classList.remove("active");
        };
    
        window.showPersonalInfo = function () {
            document.getElementById("info-content").innerHTML = `
                <div class="info-container">
                    <h4 class="card-title"><span style="text-decoration: underline;">Personal Information</span></h4>
                    <div class="info-item"><b>Father's Name:</b> ${userData.father_name}</div>
                    <div class="info-item"><b>Mother's Name:</b> ${userData.mother_name}</div>
                    <div class="info-item"><b>Date of Birth:</b> ${userData.dob}</div>
                    <div class="btn-container">
                        <button class="btn btn-danger" type="button" style="height: 19%;">Change Password</button>
                    </div>
                </div>
            `;
            document.getElementById("contact-tab").classList.remove("active");
            document.getElementById("personal-tab").classList.add("active");
        };

        document.getElementById('complainbox').onclick = function () {
            window.location.href = `complainbox.html?id=${studentId}`;
        };
    
        document.getElementById('logout').onclick = function () {
        signOut(auth)
            .then(() => {
                // Clear session storage
                sessionStorage.clear();

                // Redirect to login page
                window.location.href = "login.html";
            })
            .catch((error) => {
                console.error("Error during logout:", error.message);
                alert("Failed to log out. Please try again.");
            });
    };

    // Prevent browser caching
    window.onload = function () {
        if (performance.navigation.type === 2) {
            // Clear session storage and redirect to login if back button is pressed
            sessionStorage.clear();
            window.location.href = "login.html";
        }
    };
