<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Management</title>
    <link rel="stylesheet" href="MealManagement.css">
</head>
<body>
    <header>
        <h1>Monthly Meal Management</h1>
    </header>
    <main>
        <section class="meal-form">
            <h2>Add Meal</h2>
            <form>
                <label for="date">Date:</label>
                <input type="date" id="date" required>
                
                <label for="meal">Meal:</label>
                <input type="text" id="meal" placeholder="Enter meal details" required>
                
                <button type="submit">Save Meal</button>
            </form>
        </section>
        
        <section class="meal-plan">
            <h2>Meal Plan</h2>
            <div class="calendar">
                <!-- Meal plan grid will be displayed here -->
            </div>
        </section>
    </main>
</body>
</html>
